{% extends "shop/base.html" %}

{% block title %} Log-in {% endblock %}

{% block content %}
    <h1>Log-in</h1>

    <p>
    Please, use the following form to log-in.
    If you don't have an account <a href="{% url "register" %}">Signup</a>
    </p>

    <form method="post">

        {{ form.as_p }}
        {% csrf_token %}
        <p> <input type="submit" value="Log in"> </p>

    </form>
    
    <p> <a href="{% url 'password_reset' %}">Forgotten your password?</a> </p>
    
{% endblock %}

{% block script %}
    <script>
        {% comment %} change the django auto generated label username to username or email {% endcomment %}
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('label[for="id_username"]').innerText = 'Username or email';
        });
        
    </script>
{% endblock %}
