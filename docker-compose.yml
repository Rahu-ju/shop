networks:
  shop-backend:
    internal: true
  shop-frontend:


  
services:


  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes: 
      - .:/app
    env_file: 
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    networks:
      shop-backend:
      shop-frontend:


  rabbitmq:
    image: rabbitmq:4.2.3-management
    env_file:
      - .env
    networks:
      shop-backend:
    
  
  celery:
    build: .
    command: celery -A shop_root worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - web
    networks:
      shop-backend:
    

  flower:
    build: .
    command: celery --broker=amqp://guest:guest@rabbitmq:5672// flower --basic-auth=username:password
    depends_on:
      - celery
      - rabbitmq
    networks:
      shop-backend:
