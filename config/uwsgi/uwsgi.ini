[uwsgi]

# Application
chdir           = /app/
module          = shop_root.wsgi:application

# Unix socket and Change permissions to 666 so Nginx can talk to it
socket          = /app/config/uwsgi/shop.sock
chmod-socket    = 666

# Process
master          = true

# Tell uWSGI to create the socket as ROOT first, then change owners
(If I do not write it then it will drop the previllage to the uid then try to create the sock file, which raise error)
chown-socket    = www-data:www-data

uid             = www-data
gid             = www-data
# Clean up
vacuum          = true

